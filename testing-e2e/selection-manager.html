<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Zea UX</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        margin: 0;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        background: #1a1a1a;
        color: #e0e0e0;
      }

      #rendererHolder {
        width: 100%;
        height: calc(100% - 44px);
      }

      #renderer {
        width: 100%;
        height: 100%;
      }

      #controllers {
        display: flex;
        align-items: center;
        gap: 1.5em;
        height: 44px;
        padding: 0 1em;
        background: #242424;
        border-bottom: 1px solid #333;
      }

      .control-group {
        display: flex;
        align-items: center;
        gap: 0.6em;
      }

      .control-group + .control-group {
        padding-left: 1.5em;
        border-left: 1px solid #3a3a3a;
      }

      #controllers label {
        color: #aaa;
        user-select: none;
        cursor: pointer;
      }

      #controllers input[type='checkbox'] {
        accent-color: #4a9eff;
        width: 14px;
        height: 14px;
        cursor: pointer;
      }

      #controllers select {
        background: #2e2e2e;
        color: #e0e0e0;
        border: 1px solid #444;
        border-radius: 4px;
        padding: 3px 6px;
        cursor: pointer;
        outline: none;
      }

      #controllers select:hover {
        border-color: #666;
      }

      #controllers button {
        background: #2e2e2e;
        color: #e0e0e0;
        border: 1px solid #444;
        border-radius: 4px;
        padding: 3px 10px;
        cursor: pointer;
      }

      #controllers button:hover {
        border-color: #666;
      }

      #controllers button.active {
        background: #1a4a7a;
        border-color: #4a9eff;
        color: #fff;
      }

      #controllers button:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      .hidden {
        display: none !important;
      }
    </style>

    <script src="../node_modules/@zeainc/zea-engine/dist/index.umd.js"></script>
    <script src="../dist/index.umd.js"></script>

    <script type="module">
      const {
        GLRenderer,
        Scene,
        GeomItem,
        Material,
        Vec3,
        Xfo,
        TreeItem,
        Color,
        Cuboid,
        Sphere,
        Torus,
        SimpleSurfaceMaterial,
        KinematicGroup,
        CADAsset,
        AssetLoadContext,
      } = window.zeaEngine
      const { ToolManager, SelectionManager, SelectionTool, UndoRedoManager } = window.zeaUx

      const $canvas = document.getElementById('renderer')

      const scene = new Scene()
      scene.setupGrid(10, 10)

      const renderer = new GLRenderer($canvas, { hideSplash: true })
      renderer.setScene(scene)

      const cadAsset = new CADAsset()
      const context = new AssetLoadContext()
      context.units = 'Inches'
      // const url = 'data/zcad/3.6.0/Dead_eye_bearingSTEP.zcad'
      const url = 'data/zcad/3.9.1/Dead_eye_bearing.stp.zcad'
      cadAsset.globalXfoParam.value.tr.set(-6, 0, 0)
      cadAsset.load(url, context).then(() => {
        renderer.frameAll()
      })
      scene.getRoot().addChild(cadAsset)

      const count = 100
      const dim = Math.round(Math.cbrt(count))

      const detail = 40
      const torus = new Torus(0.15, 0.5)
      const sphere = new Sphere(0.3, 2 * detail, detail)
      const cuboid = new Cuboid(0.7, 0.7, 0.7)

      let geomItemCount = 0
      const addLayers = (layerId, treeItem) => {
        for (let j = 0; j < dim; j += 1) {
          const treeItemJ = new TreeItem('TreeItem' + j)
          treeItem.addChild(treeItemJ)

          const material = new SimpleSurfaceMaterial('mat')
          material.baseColorParam.value = Color.random()

          for (let k = 0; k < dim; k += 1) {
            let geom
            switch (geomItemCount % 4) {
              case 0:
                geom = torus
                break
              case 1:
                geom = sphere
                break
              case 2:
                geom = cuboid
                break
              case 3:
                geom = torus
                break
              default:
                break
            }
            const geomItem = new GeomItem('Geom' + k, geom, material)
            treeItemJ.addChild(geomItem)

            const xfo = new Xfo()
            xfo.tr.set(j, k, layerId)
            geomItem.getParameter('GlobalXfo').setValue(xfo)
            geomItemCount++
          }
        }
      }

      for (let i = 0; i < dim; i += 1) {
        const treeItem = new TreeItem('TreeItem' + i)
        scene.getRoot().addChild(treeItem)

        addLayers(i, treeItem)
      }

      /** */
      {
        const appData = {
          scene,
          renderer,
        }

        const selectionManager = new SelectionManager(appData, {
          enableXfoHandles: true,
        })

        const cameraManipulator = renderer.getViewport().getManipulator()
        cameraManipulator.orbitAroundCursor = true
        const selectionTool = new SelectionTool({
          selectionManager,
          ...appData,
        })

        const toolManager = new ToolManager()
        toolManager.registerTool('cameraManipulator', cameraManipulator)
        toolManager.registerTool('selectionTool', selectionTool)
        renderer.getViewport().setManipulator(toolManager)
        toolManager.pushTool('cameraManipulator')
        toolManager.pushTool('selectionTool')

        let pickingOn = false

        renderer.getViewport().on('pointerClick', (event) => {
          if (toolManager.activeTool() != selectionTool) {
            console.log(event.pointerRay.dir.toString())

            if (event.intersectionData) {
              const geomItem = event.intersectionData.geomItem

              selectionManager.toggleItemSelection(geomItem, !event.ctrlKey)
            }
          }
        })
        document.addEventListener('keydown', (e) => {
          switch (e.key) {
            case 'z':
              if (e.ctrlKey) {
                UndoRedoManager.getInstance().undo()
              }
              break
            case 'y':
              if (e.ctrlKey) {
                UndoRedoManager.getInstance().redo()
              }
              break
          }
        })

        const $pickingCheckbox = document.getElementById('picking-cbx')

        const group = new KinematicGroup()
        group.addHighlight('highlight', new Color(1, 0, 0, 0.2))

        $pickingCheckbox.addEventListener('change', (e) => {
          if ($pickingCheckbox.checked) {
            selectionManager.startPickingMode(
              (treeItem) => {
                group.addItem(treeItem)
              },
              (treeItem) => {
                if (treeItem) {
                  if (treeItem instanceof GeomItem && treeItem.geomParam.value instanceof Torus) {
                    document.body.style.cursor = 'crosshair'
                    return treeItem
                  } else {
                    document.body.style.cursor = 'not-allowed'
                  }
                } else {
                  document.body.style.cursor = 'default'
                }
              }
            )
            pickingOn = true
          } else {
            selectionManager.endPickingMode()
            toolManager.popTool()
            document.body.style.cursor = 'default'
          }
        })

        const xfoTypes = document.getElementsByName('xfo-type')
        xfoTypes.forEach((xfoType) => {
          xfoType.addEventListener('change', (e) => {
            const value = e.target.value
            selectionManager.showHandles(value)
          })
        })

        const $xfoModeSelect = document.getElementById('xfo-mode-select')
        const $pickBtn = document.getElementById('pick-btn')

        selectionManager.on('pivotModeChanged', (e) => {
          $xfoModeSelect.value = selectionManager.pivotMode
        })

        $xfoModeSelect.addEventListener('change', (e) => {
          selectionManager.pivotMode = e.target.value
        })
        let pickingSessionActive = false

        const endPickSession = () => {
          selectionManager.endPickingMode()
          toolManager.popTool()
          document.body.style.cursor = 'default'
          $pickBtn.textContent = 'Pick Object'
          $pickBtn.classList.remove('active')
          pickingSessionActive = false
        }

        $pickBtn.addEventListener('click', () => {
          if (pickingSessionActive) {
            endPickSession()
          } else {
            toolManager.pushTool('selectionTool')
            selectionManager.startPickingMode(
              (treeItem) => {
                selectionManager.pivotXfo = treeItem.globalXfoParam.value
                endPickSession()
              },
              (treeItem) => {
                if (treeItem) {
                  document.body.style.cursor = 'crosshair'
                  return treeItem
                } else {
                  document.body.style.cursor = 'default'
                }
              }
            )
            $pickBtn.textContent = 'Cancel Pick'
            $pickBtn.classList.add('active')
            pickingSessionActive = true
          }
        })
      }

      renderer.getViewport().getCamera().setPositionAndTarget(new Vec3(-6, -6, 3), new Vec3(1, 1, 2))
    </script>
  </head>
  <body>
    <div id="controllers">
      <div class="control-group">
        <input type="checkbox" name="picking-cbx" id="picking-cbx" />
        <label for="picking-cbx">Picking Mode</label>
      </div>
      <div class="control-group">
        <label for="xfo-mode-select">Xfo Mode</label>
        <select id="xfo-mode-select">
          <option value="objectOrigin">objectOrigin</option>
          <option value="objectCentroid">objectCentroid</option>
          <option value="manual">manual</option>
        </select>
        <button id="pick-btn">Pick Object</button>
      </div>
    </div>
    <div id="rendererHolder">
      <canvas id="renderer" />
    </div>
  </body>
</html>
